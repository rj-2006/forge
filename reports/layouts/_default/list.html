<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Reports - TechTalk</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            color: #fff;
            background-color: #0A0A0A;
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
        }
        a { color: #fff; text-decoration: none; }
        a:hover { text-decoration: underline; }
        .back-link { display: inline-block; margin-bottom: 2rem; padding: 0.5rem 1rem; border: 1px solid #333; text-decoration: none; border-radius: 4px; color: #aaa;}
        .back-link:hover { color: #fff; text-decoration: none; background: #111;}
        .report-card { border: 1px solid #333; padding: 1.5rem; margin-bottom: 1rem; border-radius: 4px; background: #111; }
        .report-card h2 { margin-top: 0; margin-bottom: 0.5rem; }
        .meta { color: #888; font-size: 0.9rem; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <a href="/" class="back-link">&larr; Back to Home</a>
    <h1>All Past Events & Reports</h1>
    
    <div class="reports-list">
        {{ range .Pages }}
        <div class="report-card">
            <h2><a href="{{ .Permalink }}">{{ .Title }}</a></h2>
            <div class="meta">{{ .Date.Format "January 2, 2006" }}</div>
            <p>{{ .Params.description }}</p>
        </div>
        {{ end }}
    </div>
</body>
</html>
