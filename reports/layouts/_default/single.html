<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .Title }} - TechTalk Reports</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            color: #fff;
            background-color: #0A0A0A;
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
        }
        h1, h2, h3 { color: #fff; }
        a { color: #aaa; }
        a:hover { color: #fff; }
        .back-link { display: inline-block; margin-bottom: 2rem; padding: 0.5rem 1rem; border: 1px solid #333; text-decoration: none; border-radius: 4px; }
        .meta { color: #888; font-size: 0.9rem; margin-bottom: 2rem; }
    </style>
</head>
<body>
    <a href="/reports/events/" class="back-link">&larr; Back to Events</a>
    <h1>{{ .Title }}</h1>
    <div class="meta">{{ .Date.Format "January 2, 2006" }}</div>
    
    <div class="content">
        {{ .Content }}
    </div>
</body>
</html>
